<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Chat Ultimate</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(147, 51, 234, 0.15), transparent 25%);
        }
        /* Navigace */
        .landing-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 50px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .logo { font-size: 24px; letter-spacing: 1px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; margin: 0 15px; transition: 0.3s; }
        .nav-links a:hover { color: var(--text-main); }
        .btn-login {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: var(--primary-hover); box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        /* Hero Sekce */
        .hero-section {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; text-align: center; padding: 0 20px;
            position: relative;
        }
        .hero-content { max-width: 800px; z-index: 10; margin-top: 60px; }
        .hero-content h1 { font-size: 4rem; font-weight: 900; line-height: 1.1; margin-bottom: 20px; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-content p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 40px; line-height: 1.6; }

        /* Tlačítka */
        .hero-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn-hero-download, .btn-hero-web {
            display: flex; align-items: center; gap: 10px; border: none; padding: 15px 30px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s transform, 0.3s box-shadow;
        }
        .btn-hero-download { background: var(--text-main); color: var(--bg-color); }
        .btn-hero-download:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,255,255,0.2); }
        .btn-hero-web { background: rgba(255,255,255,0.1); color: var(--text-main); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        .btn-hero-web:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
    </style>
</head>
<body>

<nav class="landing-nav">
    <div class="logo">LAN CHAT <span style="font-weight:900; color:#3b82f6;">ULTIMATE</span></div>
    <div class="nav-links">
        <a href="#download">Stáhnout</a>
        <a href="#support">Podpora</a>
    </div>
    <button class="btn-login" onclick="window.location.href='app.html'">Otevřít Chat</button>
</nav>

<header class="hero-section">
    <div class="hero-content">
        <h1>TVOJE MÍSTO PRO <br> KOMUNIKACI</h1>
        <p>
            Ať už jsi součástí školního klubu, herní skupiny, celosvětové umělecké komunity,
            nebo jen pár přátel, kteří chtějí trávit čas spolu, LAN Chat ti to usnadní.
        </p>
        <div class="hero-buttons">
            <button class="btn-hero-download" onclick="alert('Verze pro Windows (exe) zatím není k dispozici. Pracujeme na tom!')">
                <span class="material-icons">download</span> Stáhnout pro Windows
            </button>
            <button class="btn-hero-web" onclick="window.location.href='app.html'">
                <span class="material-icons">language</span> Otevřít v prohlížeči
            </button>
        </div>
    </div>
</header>

</body>
</html>
